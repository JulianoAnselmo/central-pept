name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:     # botão "Run workflow" para rebuild manual

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (static export)
        env:
          # Se repo = <user>/calcular-peps, URL será <user>.github.io/calcular-peps
          # Para domínio customizado, deixe vazio (remova a linha).
          PAGES_BASE: /${{ github.event.repository.name }}
          SITE_URL: https://${{ github.repository_owner }}.github.io
          # Descomente e adicione secrets quando Supabase entrar (Fase 2):
          # NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          # NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
